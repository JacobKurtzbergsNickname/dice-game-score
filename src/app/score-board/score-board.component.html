<main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-6 px-4 py-6 sm:px-6 lg:px-8">
  <header class="rounded-2xl border border-lime-500/40 bg-black/70 p-4 shadow-xl sm:p-6">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="space-y-2">
        <p class="text-xs text-lime-300/80">Wuerfeln</p>
        <h1 class="text-xl text-lime-300 sm:text-2xl">Score Board</h1>
        <p class="text-xs leading-relaxed text-lime-200/70 sm:text-sm">Fuer mobile Nutzung optimiert: Einen Spieler starten und beliebig viele Kacheln hinzufuegen.</p>
      </div>

      <div class="flex flex-wrap gap-2">
        <button mat-flat-button color="primary" class="h-10! sm:h-11!" type="button" (click)="addPlayer()">
          + Spieler
        </button>
        <a mat-stroked-button class="h-10! border-lime-500/50! text-lime-100! sm:h-11!" routerLink="/">Landing</a>
      </div>
    </div>
  </header>

  <section class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4">
    @for (player of players(); track player) {
      <pairodice-score-tile [playerIndex]="$index + 1"></pairodice-score-tile>
    }
  </section>

  <div class="flex justify-center pb-2">
    <button mat-flat-button color="primary" class="h-12! w-full! sm:w-auto! sm:px-8!" type="button" (click)="addPlayer()">+ Spieler hinzufuegen</button>
  </div>

</main>
